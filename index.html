<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sc.10 UD Global Systems Pretest</title>
    <style>
        :root {
            --bg-color: #E0FBFC;
            --container-bg: #FFFFFF;
            --primary: #293241;
            --accent: #3D5A80;
            --correct: #4CAF50;
            --incorrect: #EE6C4D;
            --hint-color: #98C1D9;
            --text-color: #000000;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #quiz-container {
            background-color: var(--container-bg);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-top: 10px solid var(--primary);
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .question { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid var(--accent);
            background: #fff;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
            font-size: 1rem;
            color: var(--text-color);
            transition: 0.2s;
        }

        .option-btn:hover:not([disabled]) { background-color: var(--bg-color); }
        .option-btn:disabled { opacity: 0.8; cursor: default; }

        .feedback {
            margin-top: 20px;
            padding: 18px;
            border-radius: 6px;
            display: none;
            font-weight: 600;
        }

        .hint-text {
            display: none;
            background-color: #f0f7f9;
            padding: 15px;
            border-left: 4px solid var(--hint-color);
            margin-bottom: 15px;
            font-style: italic;
        }

        #hint-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #next-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            display: none;
            margin-top: 20px;
            font-weight: bold;
        }

        #score-screen { display: none; text-align: center; }
        .summary-box { text-align: left; background: #f8f9fa; padding: 25px; border-radius: 8px; margin-top: 25px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-box">
        <h1>Sc.10 UD Global Systems Pretest</h1>
        <h3 id="progress" style="color: var(--accent);">Question 1/25</h3>
        
        <p id="question-text" class="question"></p>
        
        <button id="hint-btn" onclick="toggleHint()">💡 Show Hint</button>
        <div id="hint-display" class="hint-text"></div>

        <div id="options-container"></div>
        <div id="feedback-box" class="feedback"></div>
        
        <button id="next-btn">Next Question &rarr;</button>
        <div style="clear:both;"></div>
    </div>

    <div id="score-screen">
        <h1>Pretest Results</h1>
        <p style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">Score: <span id="final-score"></span> / 25</p>
        <div class="summary-box">
            <h3>Areas for Review:</h3>
            <ul id="study-feedback"></ul>
        </div>
        <button onclick="location.reload()" style="background: var(--accent); color:white; border:none; padding:15px 30px; border-radius:6px; margin-top:20px; cursor:pointer; font-weight:bold;">Restart Pretest</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "A sample of ice at its melting point absorbs 12.5 kJ. If Hfus is 6.01 kJ/mol, what mass of ice melted? (Molar mass = 18.02 g/mol)", a: "37.5 g", d: ["2.08 g", "1.35 g", "0.0375 g"], tag: "Energy Calculations", h: "Find moles first (n = Q/Hfus), then grams (m = n*M)." },
        { q: "Which describes the 'albedo effect' and its impact on the Earth's net radiation budget?", a: "Percentage of solar radiation reflected; higher albedo cools.", d: ["Infrared radiation trapped by gases.", "Conversion of light into chemical energy.", "Movement of thermal energy via currents."], tag: "Albedo", h: "High albedo means more light 'bounces' back into space." },
        { q: "Calculate the energy absorbed by 250 g of water heated from 20.0°C to 45.0°C.", a: "2.6 x 10^4 J", d: ["26,187.5 J", "4.7 x 10^4 J", "20.9 J"], tag: "Energy Calculations", h: "Use Q=mcΔT. Be careful: '250 g' has only 2 significant digits!" },
        { q: "In the Northern Hemisphere, the Coriolis effect deflects moving air masses to the:", a: "Right (East)", d: ["Left (West)", "Straight upward", "South Pole"], tag: "Coriolis", h: "Think 'R' for Right and 'N' for North." },
        { q: "Which atmospheric layer contains the protective ozone layer?", a: "Stratosphere", d: ["Troposphere", "Mesosphere", "Lithosphere"], tag: "Atmospheric Layers", h: "This layer is directly above where weather occurs." },
        { q: "Energy required to vaporize 50.0 g of water at 100°C? (Hvap = 40.7 kJ/mol)", a: "113 kJ", d: ["2035 kJ", "2.26 kJ", "14.7 kJ"], tag: "Energy Calculations", h: "Convert mass to moles using molar mass (18.02 g/mol) first." },
        { q: "What is an 'open system'?", a: "Exchanges both matter and energy", d: ["Exchanges energy only", "No exchange", "Net budget is zero"], tag: "Systems", h: "A garden is an open system: it gets rain (matter) and sun (energy)." },
        { q: "100g metal (90°C) is put in 100g water (20°C). Final temp is 25°C. Specific heat of the metal?", a: "0.322 J/g°C", d: ["4.19 J/g°C", "2.09 J/g°C", "0.080 J/g°C"], tag: "Energy Calculations", h: "Energy gained by water = Energy lost by metal." },
        { q: "Which is the primary natural greenhouse gas?", a: "Water Vapor", d: ["Nitrogen", "Oxygen", "Argon"], tag: "Greenhouse", h: "This gas forms clouds." },
        { q: "Water moves heat globally primarily because water has a:", a: "High specific heat capacity", d: ["Low solid density", "High albedo", "Low Hvap"], tag: "Hydrosphere", h: "This allows oceans to absorb lots of heat with little temp change." },
        { q: "During a phase change, the temperature of the substance:", a: "Remains constant", d: ["Increases steadily", "Decreases slightly", "Fluctuates"], tag: "Phase Changes", h: "Recall the horizontal plateaus on a heating curve." },
        { q: "The primary reason for Earth's seasons is:", a: "Tilt of the Earth's axis", d: ["Distance from Sun", "Solar output", "Rotation"], tag: "Astronomy", h: "Earth is tilted at 23.5 degrees." },
        { q: "Solar energy is most 'spread out' at the:", a: "Polar zones", d: ["Equator", "Tropics", "Mesosphere"], tag: "Insolation", h: "The angle of incidence is shallowest at the poles." },
        { q: "A positive net radiation budget leads to:", a: "Increasing global temperatures", d: ["Decreasing global temperatures", "Increased albedo", "Slower rotation"], tag: "Budget", h: "More income (solar) than expenses (infrared) = profit (heat)." },
        { q: "Calculate heat of fusion if 25.0 kJ melts 75.0 g.", a: "0.333 kJ/g", d: ["1.88 kJ/g", "3.00 kJ/g", "13.3 kJ/g"], tag: "Energy Calculations", h: "Hfus = Q / m." },
        { q: "Convection currents in the atmosphere are defined by:", a: "Warm air rising and cool air sinking", d: ["Conduction through ground", "Density differences only", "Moon radiation"], tag: "Convection", h: "Think about the movement of a fluid." },
        { q: "Which surface has the highest albedo?", a: "Snow and Ice", d: ["Deep Ocean", "Forest", "Soil"], tag: "Albedo", h: "Whiter surfaces reflect more." },
        { q: "Find 'c' for 50.0 g object using 1250 J over 15.0°C:", a: "1.67 J/g°C", d: ["0.600 J/g°C", "25.0 J/g°C", "375 J/g°C"], tag: "Energy Calculations", h: "c = Q / (m*ΔT)." },
        { q: "Ice core samples show climate history by:", a: "Analyzing trapped gas bubbles", d: ["Measuring ice thickness", "Checking salt", "Finding fossils"], tag: "Climate Evidence", h: "Bubbles preserve ancient atmosphere." },
        { q: "Phase change from solid directly to gas:", a: "Sublimation", d: ["Deposition", "Condensation", "Freezing"], tag: "Phase Changes", h: "Dry ice is a classic example." },
        { q: "Water is heated from 0°C to 10°C using 1.51 kJ. Calculate mass.", a: "36.0 g", d: ["15.1 g", "4.52 g", "151 g"], tag: "Energy Calculations", h: "Convert 1.51 kJ to 1510 J first!" },
        { q: "On a climatograph, precipitation and temperature are shown as:", a: "Bars and a Line", d: ["Line and Bars", "Dots", "Grid"], tag: "Climatographs", h: "Precipitation is a monthly total (bars)." },
        { q: "Biome with permafrost and low annual precipitation?", a: "Tundra", d: ["Taiga", "Grassland", "Deciduous"], tag: "Biomes", h: "Coldest and most northern biome." },
        { q: "Significant digits in 0.005040 m?", a: "4", d: ["7", "3", "6"], tag: "Sig Digits", h: "Don't count leading zeros." },
        { q: "Energy returns to space via:", a: "Infrared Radiation", d: ["Conduction", "Convection", "Visible Light"], tag: "Heat Transfer", h: "Earth 'glows' with heat that we can't see with our eyes." }
    ];

    let currentQ = 0;
    let score = 0;
    let mistakes = [];

    function loadQuestion() {
        const qBox = quizData[currentQ];
        document.getElementById("progress").innerText = `Question ${currentQ + 1}/25`;
        document.getElementById("question-text").innerText = qBox.q;
        document.getElementById("hint-display").innerText = qBox.h;
        document.getElementById("hint-display").style.display = "none";
        document.getElementById("hint-btn").innerText = "💡 Show Hint";
        
        // Shuffle Answers
        let choices = [qBox.a, ...qBox.d];
        choices.sort(() => Math.random() - 0.5);

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        
        choices.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, qBox.a);
            optionsContainer.appendChild(btn);
        });
        document.getElementById("feedback-box").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
    }

    function toggleHint() {
        const h = document.getElementById("hint-display");
        const b = document.getElementById("hint-btn");
        if (h.style.display === "none") {
            h.style.display = "block";
            b.innerText = "🙈 Hide Hint";
        } else {
            h.style.display = "none";
            b.innerText = "💡 Show Hint";
        }
    }

    function checkAnswer(selected, correct) {
        const feedback = document.getElementById("feedback-box");
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach(btn => btn.disabled = true);
        feedback.style.display = "block";

        if(selected === correct) {
            score++;
            feedback.innerHTML = "✅ Correct!";
            feedback.style.backgroundColor = "var(--correct)";
            feedback.style.color = "white";
        } else {
            mistakes.push(quizData[currentQ].tag);
            feedback.innerHTML = `❌ Incorrect.<br><strong>Correct Answer:</strong> ${correct}`;
            feedback.style.backgroundColor = "var(--incorrect)";
            feedback.style.color = "white";
        }
        document.getElementById("next-btn").style.display = "block";
    }

    document.getElementById("next-btn").onclick = () => {
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    };

    function showScore() {
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("score-screen").style.display = "block";
        document.getElementById("final-score").innerText = score;
        
        const feedbackList = document.getElementById("study-feedback");
        const uniqueMistakes = [...new Set(mistakes)];
        
        if(uniqueMistakes.length === 0) {
            feedbackList.innerHTML = "<li><strong>Mastery Achieved!</strong> You are perfectly prepared.</li>";
        } else {
            uniqueMistakes.forEach(m => {
                feedbackList.innerHTML += `<li>Review your notes on: <strong>${m}</strong></li>`;
            });
        }
    }

    loadQuestion();
</script>

</body>
</html>
