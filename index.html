<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sc.10 UD Global Systems Pretest</title>
    <style>
        :root {
            --bg-color: #E0FBFC;
            --container-bg: #FFFFFF;
            --primary: #293241;
            --accent: #3D5A80;
            --correct: #4CAF50;
            --incorrect: #EE6C4D;
            --hint-color: #98C1D9;
            --text-color: #000000;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #quiz-container {
            background-color: var(--container-bg);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-top: 10px solid var(--primary);
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        
        .question { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid var(--accent);
            background: #fff;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
            font-size: 1rem;
            color: var(--text-color);
        }

        .option-btn:hover:not([disabled]) { background-color: var(--bg-color); }

        .feedback {
            margin-top: 20px;
            padding: 18px;
            border-radius: 6px;
            display: none;
            font-weight: 600;
        }

        .hint-text {
            display: none;
            background-color: #f0f7f9;
            padding: 10px;
            border-left: 4px solid var(--hint-color);
            margin-bottom: 15px;
            font-style: italic;
        }

        #hint-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        #next-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            display: none;
            margin-top: 20px;
        }

        #score-screen { display: none; text-align: center; }
        .summary-box { text-align: left; background: #f8f9fa; padding: 25px; border-radius: 8px; margin-top: 25px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-box">
        <h1>Sc.10 UD Global Systems Pretest</h1>
        <h3 id="progress" style="color: var(--accent);">Question 1/25</h3>
        
        <p id="question-text" class="question"></p>
        
        <button id="hint-btn" onclick="toggleHint()">💡 Need a Hint?</button>
        <div id="hint-display" class="hint-text"></div>

        <div id="options-container"></div>
        <div id="feedback-box" class="feedback"></div>
        
        <button id="next-btn">Next Question &rarr;</button>
        <div style="clear:both;"></div>
    </div>

    <div id="score-screen">
        <h1>Results</h1>
        <p style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">Score: <span id="final-score"></span> / 25</p>
        <div class="summary-box">
            <h3>Study Recommendations:</h3>
            <ul id="study-feedback"></ul>
        </div>
        <button onclick="location.reload()" style="background: var(--accent); color:white; border:none; padding:15px 30px; border-radius:6px; margin-top:20px; cursor:pointer;">Restart Pretest</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "A sample of ice at its melting point absorbs 12.5 kJ. If Hfus is 6.01 kJ/mol, what mass of ice melted? (Molar mass = 18.02 g/mol)", a: ["37.5 g", "2.08 g", "1.35 g", "0.0375 g"], c: 0, tag: "Energy Calculations", h: "First find moles (n = Q / Hfus), then mass (m = n × M).", f: "Remember: Hfus is given in kJ/mol, so find moles first!" },
        { q: "Which describes the 'albedo effect' and its impact on the Earth's net radiation budget?", a: ["Percentage of solar radiation reflected; higher albedo cools.", "Infrared radiation trapped by gases.", "Conversion of light into chemical energy.", "Movement of thermal energy via currents."], c: 0, tag: "Albedo", h: "Think about why wearing white is cooler than wearing black.", f: "Albedo is all about reflection, not absorption or trapping heat." },
        { q: "Calculate the energy absorbed by 250 g of water heated from 20.0°C to 45.0°C.", a: ["2.6 x 10^4 J", "26,187.5 J", "4.7 x 10^4 J", "20.9 J"], c: 0, tag: "Energy Calculations", h: "Use Q = mcΔT. ΔT is the change in temp (45 - 20).", f: "Check your sig digs! '250 g' has only two significant digits." },
        { q: "In the Northern Hemisphere, the Coriolis effect deflects moving air masses to the:", a: ["Right (East)", "Left (West)", "Straight upward", "South Pole"], c: 0, tag: "Coriolis Effect", h: "Imagine the Earth rotating under a moving object.", f: "In the North, deflection is always to the Right." },
        { q: "Which atmospheric layer contains the protective ozone layer?", a: ["Stratosphere", "Troposphere", "Mesosphere", "Lithosphere"], c: 0, tag: "Atmospheric Layers", h: "It's the layer above the one where weather happens.", f: "Ozone is found in the Stratosphere; weather happens in the Troposphere." },
        { q: "Energy required to vaporize 50.0 g of water at 100°C? (Hvap = 40.7 kJ/mol)", a: ["113 kJ", "2035 kJ", "2.26 kJ", "14.7 kJ"], c: 0, tag: "Energy Calculations", h: "Convert grams to moles first (mass / molar mass).", f: "You must use moles (n) for vaporization energy, not mass (m)." },
        { q: "What is an 'open system'?", a: ["Exchanges both matter and energy", "Exchanges energy but not matter", "Exchanges neither matter nor energy", "Net radiation budget is zero"], c: 0, tag: "Systems", h: "Can energy and matter cross the boundary?", f: "Open systems allow both mass and energy transfer." },
        { q: "100g of metal (90°C) is put in 100g water (20°C). Final temp is 25°C. Specific heat of the metal?", a: ["0.322 J/g°C", "4.19 J/g°C", "2.09 J/g°C", "0.080 J/g°C"], c: 0, tag: "Energy Calculations", h: "Energy gained by water = Energy lost by metal.", f: "The water warmed up by 5°C, while the metal cooled by 65°C." },
        { q: "Which is the primary natural greenhouse gas?", a: ["Water Vapor", "Nitrogen", "Oxygen", "Argon"], c: 0, tag: "Greenhouse Effect", h: "Which gas is responsible for most natural trapping of heat?", f: "Water vapor is the most abundant and primary natural greenhouse gas." },
        { q: "Water moves heat globally primarily because water has a:", a: ["High specific heat capacity", "Low density as a solid", "High albedo", "Low heat of vaporization"], c: 0, tag: "Hydrosphere", h: "Think about how much energy water can carry without getting very hot.", f: "A high specific heat capacity allows water to store and move huge amounts of energy." },
        { q: "During a phase change from liquid to gas, the temperature:", a: ["Remains constant", "Increases steadily", "Decreases slightly", "Fluctuates"], c: 0, tag: "Phase Changes", h: "Look at the flat plateaus on a heating curve.", f: "Temperature does not change until the phase change is 100% complete." },
        { q: "Primary reason for seasons?", a: ["Tilt of the Earth's axis", "Distance from the Sun", "Solar output", "Rotation"], c: 0, tag: "Earth's Tilt", h: "The axis is tilted at 23.5 degrees.", f: "Distance from the sun is NOT the cause; it's the 23.5° tilt." },
        { q: "Solar energy is most 'spread out' at the:", a: ["Polar zones", "Equator", "Tropics", "Mesosphere"], c: 0, tag: "Insolation", h: "Think about the angle of a flashlight hitting a curved ball.", f: "At high latitudes (poles), solar energy hits at a shallow angle and spreads out." },
        { q: "Positive net radiation budget means:", a: ["Global temps increase", "Global temps decrease", "Albedo increases", "Rotation slows"], c: 0, tag: "Radiation Budget", h: "More energy is coming in than going out.", f: "Positive budget = Energy Surplus = Warming." },
        { q: "Calculate heat of fusion if 25.0 kJ melts 75.0 g.", a: ["0.333 kJ/g", "1.88 kJ/g", "3.00 kJ/g", "13.3 kJ/g"], c: 0, tag: "Energy Calculations", h: "Heat of fusion (H) = Energy (Q) / mass (m).", f: "Divide the energy by the mass to find kJ per gram." },
        { q: "Convection currents are defined by:", a: ["Warm air rising, cool air sinking", "Conduction through ground", "Density differences alone", "Moon radiation"], c: 0, tag: "Convection", h: "It involves a circular motion of fluid particles.", f: "The rising of warm (less dense) air and sinking of cool air creates the current." },
        { q: "Which surface has the highest albedo?", a: ["Snow and Ice", "Deep Ocean", "Forest", "Soil"], c: 0, tag: "Albedo", h: "Which one looks brightest from space?", f: "Snow and ice reflect up to 90% of incoming light." },
        { q: "Find 'c' for 50.0 g object using 1250 J over 15.0°C:", a: ["1.67 J/g°C", "0.600 J/g°C", "25.0 J/g°C", "375 J/g°C"], c: 0, tag: "Energy Calculations", h: "c = Q / (m × ΔT).", f: "Make sure you divide 1250 by both 50 AND 15." },
        { q: "Ice core samples show history by:", a: ["Trapped gas bubbles", "Ice thickness", "Salt content", "Fossils"], c: 0, tag: "Climate Evidence", h: "Snow traps air as it turns into ice layers.", f: "Trapped air bubbles preserve ancient atmospheric CO2 levels." },
        { q: "Phase change from solid to gas:", a: ["Sublimation", "Deposition", "Condensation", "Freezing"], c: 0, tag: "Phase Changes", h: "Think of dry ice turning into fog.", f: "Sublimation skips the liquid phase entirely." },
        { q: "Water is heated from 0°C to 10°C using 1.51 kJ. Mass?", a: ["36.0 g", "15.1 g", "4.52 g", "151 g"], c: 0, tag: "Energy Calculations", h: "m = Q / (c × ΔT). Change 1.51 kJ to 1510 J first.", f: "You must convert kJ to J to match the specific heat units." },
        { q: "Climatograph displays:", a: ["Bars (Precip) & Line (Temp)", "Line (Precip) & Bars (Temp)", "Dots", "Shaded regions"], c: 0, tag: "Climatographs", h: "One shows a total monthly amount, the other a trend line.", f: "Precipitation = Bars; Temperature = Line." },
        { q: "Biome with permafrost and low precipitation?", a: ["Tundra", "Taiga", "Grassland", "Deciduous"], c: 0, tag: "Biomes", h: "It is the northernmost and coldest biome.", f: "Tundra is defined by permafrost and low moisture." },
        { q: "Sig digits in 0.005040 m?", a: ["4", "7", "3", "6"], c: 0, tag: "Sig Digits", h: "Leading zeros never count. Trailing zeros after a decimal DO count.", f: "The digits 5, 0, 4, and the final 0 are significant." },
        { q: "Energy returns to space via:", a: ["Infrared Radiation", "Conduction", "Convection", "Visible Light"], c: 0, tag: "Heat Transfer", h: "It's a form of long-wave electromagnetic radiation.", f: "Earth re-emits solar energy as long-wave Infrared radiation." }
    ];

    let currentQ = 0;
    let score = 0;
    let mistakes = [];

    function loadQuestion() {
        const qBox = quizData[currentQ];
        document.getElementById("progress").innerText = `Question ${currentQ + 1}/25`;
        document.getElementById("question-text").innerText = qBox.q;
        document.getElementById("hint-display").innerText = qBox.h;
        document.getElementById("hint-display").style.display = "none";
        
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        
        qBox.a.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            optionsContainer.appendChild(btn);
        });
        document.getElementById("feedback-box").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("hint-btn").style.display = "block";
    }

    function toggleHint() {
        const h = document.getElementById("hint-display");
        h.style.display = (h.style.display === "none") ? "block" : "none";
    }

    function checkAnswer(idx) {
        const qBox = quizData[currentQ];
        const feedback = document.getElementById("feedback-box");
        const buttons = document.querySelectorAll(".option-btn");
        
        buttons.forEach(btn => btn.disabled = true);
        document.getElementById("hint-btn").style.display = "none";
        document.getElementById("hint-display").style.display = "none";
        feedback.style.display = "block";

        if(idx === qBox.c) {
            score++;
            feedback.innerText = "✅ Correct!";
            feedback.style.backgroundColor = "var(--correct)";
            feedback.style.color = "white";
        } else {
            mistakes.push(qBox.tag);
            feedback.innerHTML = `❌ Incorrect.<br><strong>Correct Answer:</strong> ${qBox.a[qBox.c]}<br><br><small>${qBox.f}</small>`;
            feedback.style.backgroundColor = "var(--incorrect)";
            feedback.style.color = "white";
        }
        document.getElementById("next-btn").style.display = "block";
    }

    document.getElementById("next-btn").onclick = () => {
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    };

    function showScore() {
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("score-screen").style.display = "block";
        document.getElementById("final-score").innerText = score;
        
        const feedbackList = document.getElementById("study-feedback");
        const uniqueMistakes = [...new Set(mistakes)];
        
        if(uniqueMistakes.length === 0) {
            feedbackList.innerHTML = "<li><strong>Mastery Achieved!</strong> You're ready for the Unit D Exam.</li>";
        } else {
            uniqueMistakes.forEach(m => {
                feedbackList.innerHTML += `<li><strong>Focus on ${m}:</strong> Review your notes on this topic to improve.</li>`;
            });
        }
    }

    loadQuestion();
</script>

</body>
</html>
