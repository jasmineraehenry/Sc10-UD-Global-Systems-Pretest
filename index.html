<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sc.10 UD Global Systems Pretest</title>
    <style>
        :root {
            --bg-color: #E0FBFC; /* Glacial Blue */
            --container-bg: #FFFFFF;
            --primary: #293241; /* Deep Ocean */
            --accent: #3D5A80; /* Forest Blue/Green */
            --correct: #4CAF50; /* Success Green */
            --incorrect: #EE6C4D; /* Climate Warning Coral */
            --text-color: #000000; /* Strict Black Text */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        #quiz-container {
            background-color: var(--container-bg);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-top: 10px solid var(--primary);
        }

        h1 { 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .question { 
            font-size: 1.25rem; 
            font-weight: 700; 
            margin-bottom: 25px; 
            color: var(--text-color);
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid var(--accent);
            background: #fff;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            color: var(--text-color);
        }

        .option-btn:hover:not([disabled]) {
            background-color: var(--bg-color);
            border-color: var(--primary);
        }

        .option-btn:disabled { cursor: default; }

        .feedback {
            margin-top: 25px;
            padding: 18px;
            border-radius: 6px;
            display: none;
            font-weight: 600;
            text-align: center;
        }

        #next-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            display: none;
            margin-top: 20px;
            font-weight: bold;
        }

        #score-screen { display: none; text-align: center; }
        .summary-box { text-align: left; background: #f8f9fa; padding: 25px; border-radius: 8px; margin-top: 25px; border-left: 5px solid var(--accent); }
        .summary-box li { margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-box">
        <h1>Sc.10 UD Global Systems Pretest</h1>
        <h3 id="progress" style="color: var(--accent);">Question 1/25</h3>
        <p id="question-text" class="question"></p>
        <div id="options-container"></div>
        <div id="feedback-box" class="feedback"></div>
        <button id="next-btn">Next Question &rarr;</button>
        <div style="clear:both;"></div>
    </div>

    <div id="score-screen">
        <h1>Pretest Results</h1>
        <p style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">Score: <span id="final-score"></span> / 25</p>
        <div class="summary-box">
            <h3 style="color: var(--primary);">Topic-Specific Feedback:</h3>
            <ul id="study-feedback"></ul>
        </div>
        <button id="restart-btn" onclick="location.reload()" style="background: var(--accent); color:white; border:none; padding:15px 30px; border-radius:6px; margin-top:20px; cursor:pointer;">Restart Pretest</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "A sample of ice at its melting point absorbs 12.5 kJ. If Hfus is 6.01 kJ/mol, what mass of ice melted? (Molar mass = 18.02 g/mol)", a: ["37.5 g", "2.08 g", "1.35 g", "0.0375 g"], c: 0, tag: "Energy Calculations" },
        { q: "Which of the following describes the 'albedo effect' and its impact on the Earth's net radiation budget?", a: ["Percentage of solar radiation reflected; higher albedo cools.", "Infrared radiation trapped by gases.", "Conversion of light into chemical energy.", "Movement of thermal energy via currents."], c: 0, tag: "Albedo" },
        { q: "Calculate the quantity of thermal energy absorbed by 250 g of water heated from 20.0°C to 45.0°C.", a: ["2.6 x 10^4 J", "26,187.5 J", "4.7 x 10^4 J", "20.9 J"], c: 0, tag: "Energy Calculations" },
        { q: "In the Northern Hemisphere, the Coriolis effect deflects moving air masses to the:", a: ["Right (East)", "Left (West)", "Straight upward", "South Pole"], c: 0, tag: "Coriolis Effect" },
        { q: "Which atmospheric layer contains the protective ozone layer?", a: ["Stratosphere", "Troposphere", "Mesosphere", "Lithosphere"], c: 0, tag: "Atmospheric Layers" },
        { q: "Energy required to vaporize 50.0 g of water at 100°C? (Hvap = 40.7 kJ/mol)", a: ["113 kJ", "2035 kJ", "2.26 kJ", "14.7 kJ"], c: 0, tag: "Energy Calculations" },
        { q: "Which of the following describes an 'open system'?", a: ["Exchanges both matter and energy", "Exchanges energy but not matter", "Exchanges neither matter nor energy", "Net radiation budget is always zero"], c: 0, tag: "Systems" },
        { q: "100g of metal (90°C) is put in 100g of water (20°C). Final temp is 25°C. Specific heat of the metal?", a: ["0.322 J/g°C", "4.19 J/g°C", "2.09 J/g°C", "0.080 J/g°C"], c: 0, tag: "Energy Calculations" },
        { q: "Which is the primary natural greenhouse gas contributing to the greenhouse effect?", a: ["Water Vapor", "Nitrogen", "Oxygen", "Argon"], c: 0, tag: "Greenhouse Effect" },
        { q: "The hydrosphere moves heat globally primarily because water has a:", a: ["High specific heat capacity", "Low density as a solid", "High albedo", "Low heat of vaporization"], c: 0, tag: "Hydrosphere" },
        { q: "During a phase change from liquid to gas, the temperature of the substance:", a: ["Remains constant", "Increases steadily", "Decreases slightly", "Fluctuates"], c: 0, tag: "Phase Changes" },
        { q: "The primary reason for Earth's seasons is:", a: ["Tilt of the Earth's axis", "Distance from the Sun", "Solar output changes", "Rotation speed"], c: 0, tag: "Earth's Tilt" },
        { q: "Solar energy is most 'spread out' (least intense) at the:", a: ["Polar zones", "Equator", "Tropics", "Mesosphere"], c: 0, tag: "Insolation" },
        { q: "A positive net radiation budget for an extended period leads to:", a: ["Increasing global temperatures", "Decreasing global temperatures", "Increased polar albedo", "Slower rotation"], c: 0, tag: "Radiation Budget" },
        { q: "Calculate heat of fusion if 25.0 kJ melts 75.0 g of a substance.", a: ["0.333 kJ/g", "1.88 kJ/g", "3.00 kJ/g", "13.3 kJ/g"], c: 0, tag: "Energy Calculations" },
        { q: "Convection currents in the atmosphere are primarily defined by:", a: ["Warm air rising and cool air sinking", "Conduction through ground", "Density differences alone", "Moon radiation"], c: 0, tag: "Convection" },
        { q: "Which of these surfaces has the highest albedo?", a: ["Snow and Ice", "Deep Ocean", "Coniferous Forest", "Agricultural Soil"], c: 0, tag: "Albedo" },
        { q: "Find 'c' for a 50.0 g object using 1250 J over a 15.0°C change:", a: ["1.67 J/g°C", "0.600 J/g°C", "25.0 J/g°C", "375 J/g°C"], c: 0, tag: "Energy Calculations" },
        { q: "Ice core samples provide evidence of past climate by:", a: ["Analyzing trapped gas bubbles", "Measuring ice thickness", "Checking salt levels", "Finding desert fossils"], c: 0, tag: "Climate Evidence" },
        { q: "Phase change from solid directly to gas:", a: ["Sublimation", "Deposition", "Condensation", "Solidification"], c: 0, tag: "Phase Changes" },
        { q: "Water is heated from 0°C to 10°C using 1.51 kJ. Calculate the mass.", a: ["36.0 g", "15.1 g", "4.52 g", "151 g"], c: 0, tag: "Energy Calculations" },
        { q: "On a climatograph, precipitation and temperature are shown as:", a: ["Bars and a Line", "Line and Bars", "Dots and a Grid", "Shaded regions"], c: 0, tag: "Climatographs" },
        { q: "Biome with permafrost and low annual precipitation?", a: ["Tundra", "Taiga", "Grassland", "Deciduous Forest"], c: 0, tag: "Biomes" },
        { q: "Significant digits in 0.005040 m?", a: ["4", "7", "3", "6"], c: 0, tag: "Sig Digits" },
        { q: "Thermal energy is transferred from Earth back into space via:", a: ["Infrared Radiation", "Conduction", "Convection", "Visible Light"], c: 0, tag: "Heat Transfer" }
    ];

    let currentQ = 0;
    let score = 0;
    let mistakes = [];

    function loadQuestion() {
        const qBox = quizData[currentQ];
        document.getElementById("progress").innerText = `Question ${currentQ + 1}/25`;
        document.getElementById("question-text").innerText = qBox.q;
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        
        qBox.a.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            optionsContainer.appendChild(btn);
        });
        document.getElementById("feedback-box").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
    }

    function checkAnswer(idx) {
        const qBox = quizData[currentQ];
        const feedback = document.getElementById("feedback-box");
        const buttons = document.querySelectorAll(".option-btn");
        
        buttons.forEach(btn => btn.disabled = true);
        feedback.style.display = "block";

        if(idx === qBox.c) {
            score++;
            feedback.innerText = "Correct! Well done.";
            feedback.style.backgroundColor = "var(--correct)";
            feedback.style.color = "white";
        } else {
            mistakes.push(qBox.tag);
            feedback.innerText = "Incorrect. Correct answer: " + qBox.a[qBox.c];
            feedback.style.backgroundColor = "var(--incorrect)";
            feedback.style.color = "white";
        }
        document.getElementById("next-btn").style.display = "block";
    }

    document.getElementById("next-btn").onclick = () => {
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    };

    function showScore() {
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("score-screen").style.display = "block";
        document.getElementById("final-score").innerText = score;
        
        const feedbackList = document.getElementById("study-feedback");
        const uniqueMistakes = [...new Set(mistakes)];
        
        if(uniqueMistakes.length === 0) {
            feedbackList.innerHTML = "<li><strong>Excellent!</strong> You are fully prepared for the Unit D test.</li>";
        } else {
            uniqueMistakes.forEach(m => {
                let msg = "";
                if(m === "Energy Calculations") msg = "Review q=mct and phase change formulas. Check units (kJ vs J) and sig digs.";
                if(m === "Sig Digits") msg = "Leading zeros are placeholders; trailing zeros after a decimal are significant.";
                if(m === "Albedo") msg = "High albedo = more reflection (ice/snow). Low albedo = more absorption (water).";
                if(m === "Phase Changes") msg = "Remember that temperature stays constant during a phase change plateau.";
                if(m === "Coriolis Effect") msg = "Deflection is to the right in the North and to the left in the South.";
                feedbackList.innerHTML += `<li><strong>${m}:</strong> ${msg}</li>`;
            });
        }
    }

    loadQuestion();
</script>

</body>
</html>
